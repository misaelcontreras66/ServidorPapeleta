<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Redirigiendo...</title>
</head>
<body>

<h2>Conectando con el servidor...</h2>

<script>

fetch("ip.json")
.then(res => res.json())
.then(data => {

    const url = "http://" + data.ip + ":" + data.puerto;

    window.location.href = url;

})
.catch(() => {
    document.body.innerHTML =
    "<h2>Error: no se pudo conectar con el servidor</h2>";
});

</script>

</body>
</html>
